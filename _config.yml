# Site
title: "trend log"
description: "요즘 뜨고 있는 것들에 대한 짧은 기록"
author: haangman
lang: ko-KR
timezone: Asia/Seoul

# URL
url: "https://haangman.github.io"
baseurl: "/blogMaker"

# Build
theme: minima
markdown: kramdown
permalink: /:year/:month/:day/:slug/

# Pagination
paginate: 10
paginate_path: "/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude from build
exclude:
  - CLAUDE.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .env
  - .env.example
  - config/
  - data/
  - src/
  - node_modules/
  - vendor/

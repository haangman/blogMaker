  - id: street
    label_ko: "스트리트·캐주얼"
    hints: "데일리 룩, 스트리트 스타일, 캐주얼 코디"
  - id: luxury
    label_ko: "럭셔리·브랜드"
    hints: "샤넬·디올·구찌·에르메스 등 럭셔리 브랜드 소식, 컬렉션 발표, 인수합병"
  - id: kpop_fashion
    label_ko: "K-패션·셀럽"
